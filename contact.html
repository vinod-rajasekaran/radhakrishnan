<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Dr. R. Radhakrishnan</title>
  <meta name="description" content="Get in touch with Dr. R. Radhakrishnan's anthology team.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Noto+Serif+Tamil:wght@300;400;600&family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/site.css?v=20260718t">
</head>
<body data-page="contact">
  <header id="site-header"></header>

  <main>
    <div class="page-head">
      <p class="breadcrumb"><a href="index.html">Home</a> / Contact</p>
      <h1 class="page-title">Get in touch</h1>
    </div>

    <div class="contact-wrap">
      <p>We look forward to sharing these compositions with a global audience. If you'd like to use one of the songs, have a correction, or just want to say hello, we'd love to hear from you.</p>

      <form class="contact-form" id="contact-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="contact-name">Name</label>
          <input class="form-input" type="text" id="contact-name" name="name" placeholder="Your name" autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label" for="contact-email">Email</label>
          <input class="form-input" type="email" id="contact-email" name="email" placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="contact-message">Message</label>
          <textarea class="form-textarea" id="contact-message" name="message" rows="6" placeholder="Your message…"></textarea>
        </div>

        <button type="submit" class="btn btn-start">Send message</button>
      </form>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="assets/js/site.js?v=20260718t"></script>
  <script src="assets/js/contact.js?v=20260718t"></script>
</body>
</html>
